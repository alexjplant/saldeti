{{define "title"}}Users — Saldeti{{end}}

{{define "content"}}
<hgroup>
    <h2>Users</h2>
    <p>{{.TotalCount}} total users</p>
</hgroup>

<nav style="margin-bottom: var(--pico-spacing);">
    <ul>
        <li>
            <form method="GET" action="/ui/users" style="margin-bottom: 0;">
                <fieldset role="group" style="margin-bottom: 0;">
                    <input type="search" name="search" placeholder="Search users..." value="{{.Search}}" />
                    <input type="submit" value="Search" />
                </fieldset>
            </form>
        </li>
    </ul>
    <ul>
        <li>
            <a href="/ui/users/new" role="button">{{template "icon-plus" .}} New User</a>
        </li>
    </ul>
</nav>
{{if .Search}}<p><small>Filtered by "{{.Search}}" — <a href="/ui/users">Clear</a></small></p>{{end}}

<figure>
    <table class="striped">
        <thead>
            <tr>
                <th>Display Name</th>
                <th>UPN</th>
                <th>Mail</th>
                <th>Department</th>
                <th>Enabled</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {{range .Users}}
            <tr>
                <td><a href="/ui/users/{{.ID}}">{{.DisplayName}}</a></td>
                <td>{{.UserPrincipalName}}</td>
                <td>{{.Mail}}</td>
                <td>{{.Department}}</td>
                <td>{{yesno .AccountEnabled}}</td>
                <td>
                    <div role="group">
                        <a href="/ui/users/{{.ID}}" role="button" class="outline secondary" title="View" aria-label="View">{{template "icon-eye" .}}</a>
                        <a href="/ui/users/{{.ID}}/edit" role="button" class="outline secondary" title="Edit" aria-label="Edit">{{template "icon-pencil" .}}</a>
                        <form id="delete-user-{{.ID}}" method="POST" action="/ui/users/{{.ID}}/delete" onsubmit="return confirm('Delete {{.DisplayName}}?');" style="display: none;"></form>
                        <button form="delete-user-{{.ID}}" type="submit" title="Delete" aria-label="Delete" class="outline danger">{{template "icon-trash-2" .}}</button>
                    </div>
                </td>
            </tr>
            {{else}}
            <tr><td colspan="6">No users found.</td></tr>
            {{end}}
        </tbody>
    </table>
</figure>

{{template "pagination" .}}
{{end}}
