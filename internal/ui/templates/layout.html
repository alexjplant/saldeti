{{define "layout"}}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Saldeti Admin{{end}}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
    {{block "head" .}}{{end}}
</head>
<body>
    <nav>
        <ul>
            <li><strong><a href="/ui">Saldeti</a></strong></li>
        </ul>
        <ul>
            <li><a href="/ui">Dashboard</a></li>
            <li><a href="/ui/users">Users</a></li>
            <li><a href="/ui/groups">Groups</a></li>
        </ul>
    </nav>

    <main>
        {{template "flash" .}}
        {{block "content" .}}{{end}}
    </main>

    <footer>
        <small>Saldeti Graph API Simulator</small>
    </footer>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
    {{block "scripts" .}}{{end}}
</body>
</html>
{{end}}
