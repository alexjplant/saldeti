{{define "title"}}Dashboard — Saldeti{{end}}

{{define "content"}}
<hgroup>
    <h2>Dashboard</h2>
    <p>Graph API Simulator overview</p>
</hgroup>

<div class="grid">
    <article>
        <header>
            <h3 style="margin-bottom: 0;">{{.TotalUsers}}</h3>
        </header>
        Total Users
        <footer>
            <a href="/ui/users" role="button" class="outline contrast" style="width: 100%;">View Users</a>
        </footer>
    </article>
    <article>
        <header>
            <h3 style="margin-bottom: 0;">{{.EnabledUsers}}</h3>
        </header>
        Enabled Users
    </article>
    <article>
        <header>
            <h3 style="margin-bottom: 0;">{{.DisabledUsers}}</h3>
        </header>
        Disabled Users
    </article>
    <article>
        <header>
            <h3 style="margin-bottom: 0;">{{.TotalGroups}}</h3>
        </header>
        Total Groups
        <footer>
            <a href="/ui/groups" role="button" class="outline contrast" style="width: 100%;">View Groups</a>
        </footer>
    </article>
</div>
{{end}}
