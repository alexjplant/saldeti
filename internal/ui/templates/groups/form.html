{{define "title"}}{{if .IsEdit}}Edit Group{{else}}New Group{{end}} — Saldeti{{end}}

{{define "content"}}
<hgroup>
    <h1>{{if .IsEdit}}Edit Group{{else}}New Group{{end}}</h1>
</hgroup>

{{if .Error}}
<blockquote>
    <p>{{.Error}}</p>
</blockquote>
{{end}}

<form method="POST" action="{{.FormAction}}">
    <label for="displayName">Display Name *
        <input type="text" id="displayName" name="displayName" value="{{.Form.DisplayName}}" required>
    </label>
    <label for="description">Description
        <textarea id="description" name="description" rows="3">{{.Form.Description}}</textarea>
    </label>
    <label for="mailNickname">Mail Nickname
        <input type="text" id="mailNickname" name="mailNickname" value="{{.Form.MailNickname}}">
    </label>
    <fieldset>
        <label>
            <input type="checkbox" name="securityEnabled" value="true" {{if eq .Form.SecurityEnabled "true"}}checked{{end}}>
            Security Enabled
        </label>
        <label>
            <input type="checkbox" name="mailEnabled" value="true" {{if eq .Form.MailEnabled "true"}}checked{{end}}>
            Mail Enabled
        </label>
    </fieldset>
    <label>
        <input type="checkbox" name="unified" value="true" {{if eq .Form.Unified "true"}}checked{{end}}>
        Unified (M365 Group)
    </label>
    <label for="visibility">Visibility
        <select id="visibility" name="visibility">
            <option value="Public" {{if eq .Form.Visibility "Public"}}selected{{end}}>Public</option>
            <option value="Private" {{if eq .Form.Visibility "Private"}}selected{{end}}>Private</option>
            <option value="HiddenMembership" {{if eq .Form.Visibility "HiddenMembership"}}selected{{end}}>HiddenMembership</option>
        </select>
    </label>

    <button type="submit">{{if .IsEdit}}Update Group{{else}}Create Group{{end}}</button>
    <a href="{{.CancelURL}}">Cancel</a>
</form>
{{end}}
